version: "2"
linters:
  default: all
  enable:
    - wsl_v5
    - gomodguard_v2
  settings:
    wsl_v5:
      allow-first-in-block: true
      allow-whole-block: false
      branch-max-lines: 2
    depguard:
      rules:
        Main:
          allow:
            - $gostd
            - github.com/AnthonyLonsMax/radixtree
  disable:
    - wsl
    - gomodguard
formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
    - golines
